<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="calculator">
    <header class="calculator__header">
      <span class="calculator__title">Калькулятор</span>
      <button class="calculator__history-toggle" id="historyToggle" type="button" aria-label="История вычислений">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3 3"/>
        </svg>
      </button>
    </header>

    <section class="display" id="display">
      <div class="display__expression" id="expression"></div>
      <div class="display__result" id="result">0</div>
    </section>

    <section class="keypad" id="keypad">
      <button class="key key--function" data-action="clear">C</button>
      <button class="key key--function" data-action="backspace">⌫</button>
      <button class="key key--function" data-action="percent">%</button>
      <button class="key key--operator" data-action="operator" data-value="/">÷</button>

      <button class="key key--digit" data-action="digit" data-value="7">7</button>
      <button class="key key--digit" data-action="digit" data-value="8">8</button>
      <button class="key key--digit" data-action="digit" data-value="9">9</button>
      <button class="key key--operator" data-action="operator" data-value="*">×</button>

      <button class="key key--digit" data-action="digit" data-value="4">4</button>
      <button class="key key--digit" data-action="digit" data-value="5">5</button>
      <button class="key key--digit" data-action="digit" data-value="6">6</button>
      <button class="key key--operator" data-action="operator" data-value="-">−</button>

      <button class="key key--digit" data-action="digit" data-value="1">1</button>
      <button class="key key--digit" data-action="digit" data-value="2">2</button>
      <button class="key key--digit" data-action="digit" data-value="3">3</button>
      <button class="key key--operator" data-action="operator" data-value="+">+</button>

      <button class="key key--digit key--zero" data-action="digit" data-value="0">0</button>
      <button class="key key--digit" data-action="decimal" data-value=".">,</button>
      <button class="key key--equals" data-action="equals">=</button>
    </section>
  </main>

  <aside class="history" id="historyPanel">
    <div class="history__header">
      <span>История</span>
      <button class="history__clear" id="historyClear" type="button">Очистить</button>
    </div>
    <ul class="history__list" id="historyList">
      <li class="history__empty">Пока пусто</li>
    </ul>
  </aside>

  <script src="script.js"></script>
</body>
</html>
